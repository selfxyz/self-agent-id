      security:
        - selfAgentAuth: []
      responses:
        "200":
          description: Aggregate census stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CensusGetResponse"
              example:
                topCountries:
                  - country: GBR
                    count: 12
                  - country: USA
                    count: 8
                  - country: DEU
                    count: 5
                verifiedOver18: 20
                verifiedOver21: 15
