  # ── AA Proxy ─────────────────────────────────────────────────────
  /api/aa/token:
    post:
      tags: [AA Proxy]
      summary: Issue AA proxy token
      operationId: issueAaToken
      description: >
        Issues a short-lived token for accessing the bundler and
        paymaster proxy endpoints. Origin-restricted and rate-limited
        (30 req/min per IP).
      parameters:
        - $ref: "#/components/parameters/chainIdQuery"
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AaTokenResponse"
              example:
                token: "eyJhbGciOi..."
                expiresAt: 1740001800000
        "400":
          description: Unsupported or missing chain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Origin check failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  retryAfterMs:
                    type: integer

  /api/aa/bundler:
    post:
      tags: [AA Proxy]
      summary: Bundler JSON-RPC proxy
      operationId: bundlerProxy
      description: >
        Proxies ERC-4337 bundler JSON-RPC calls to Pimlico. Requires an
        `x-aa-proxy-token` header. Allowed methods:
        `eth_chainId`, `eth_supportedEntryPoints`,
        `eth_estimateUserOperationGas`, `eth_sendUserOperation`,
        `eth_getUserOperationReceipt`, `eth_getUserOperationByHash`,
        `eth_gasPrice`, `eth_maxPriorityFeePerGas`.
      security:
        - aaProxyToken: []
      parameters:
        - $ref: "#/components/parameters/chainIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JsonRpcRequest"
            example:
              jsonrpc: "2.0"
              method: eth_sendUserOperation
              params: []
              id: 1
      responses:
        "200":
          description: Upstream bundler response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
        "400":
          description: Invalid JSON-RPC or method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid AA proxy token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: Request too large (200 KB limit)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  retryAfterMs:
                    type: integer

  /api/aa/paymaster:
    post:
      tags: [AA Proxy]
      summary: Paymaster JSON-RPC proxy
      operationId: paymasterProxy
      description: >
        Proxies ERC-4337 paymaster JSON-RPC calls to Pimlico. Requires
        an `x-aa-proxy-token` header. Allowed methods:
        `pm_sponsorUserOperation`, `pm_getPaymasterData`,
        `pm_getPaymasterStubData`, `eth_chainId`.
      security:
        - aaProxyToken: []
      parameters:
        - $ref: "#/components/parameters/chainIdQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JsonRpcRequest"
            example:
              jsonrpc: "2.0"
              method: pm_sponsorUserOperation
              params: []
              id: 1
      responses:
        "200":
          description: Upstream paymaster response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
        "400":
          description: Invalid JSON-RPC or method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid AA proxy token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: Request too large (200 KB limit)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  retryAfterMs:
                    type: integer
