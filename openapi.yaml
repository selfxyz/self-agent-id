  /api/demo/chat:
    post:
      tags: [Demo]
      summary: AI agent chat
      operationId: demoChat
      description: >
        AI chat endpoint backed by a LangChain agent. Signed requests
        are verified on-chain; unsigned requests are treated as
        anonymous (LangChain may refuse).
      security:
        - selfAgentAuth: []
      requestBody:
        required: true
        content:
